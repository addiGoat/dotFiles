$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
    ignore_empty_input = true
}

animations {
    enabled = true

    bezier = smooth, 0.25, 1, 0.5, 1
    animation = fadeIn, 1, 4, smooth
    animation = fadeOut, 1, 4, smooth
    animation = inputFieldDots, 1, 2, smooth
    animation = inputFieldColors, 1, 3, smooth
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    color = rgba(24, 24, 37, 1.0)
}

# soft outer circle
shape {
    monitor =
    size = 280, 280
    color = rgba(30, 30, 46, 0.45)
    rounding = -1
    border_size = 3
    border_color = rgba(108, 112, 134, 0.7)

    position = 0, 20
    halign = center
    valign = center
}

# inner glow ring
shape {
    monitor =
    size = 210, 210
    color = rgba(0, 0, 0, 0.0)
    rounding = -1
    border_size = 8
    border_color = rgba(203, 166, 247, 0.85)

    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 220, 52
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(0, 0, 0, 0.0)
    check_color = rgba(166, 227, 161, 0.95)
    fail_color = rgba(243, 139, 168, 0.95)

    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    placeholder_text = <i>Password…</i>
    fail_text = <i>$FAIL</i>
    hide_input = false
    dots_spacing = 0.25
    dots_center = true

    font_family = $font
    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = $font

    position = 0, -220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(166, 173, 200, 1.0)
    font_size = 20
    font_family = $font

    position = 0, -150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##6c7086'>Locked as</span> <span foreground='##cdd6f4'>$USER</span>"
    font_size = 16
    font_family = $font

    position = 0, 200
    halign = center
    valign = center
}
