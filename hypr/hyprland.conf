###############
### SOURCES ###
###############

# Directory variables
$shareDir = ~/.config/hypr/shared
$profileDir = ~/.config/hypr/profile

# Shared configs
source = $shareDir/hyprbinds.conf
source = $shareDir/special_workspaces.conf
source = $shareDir/rules.conf
source = $shareDir/shared.conf

# Profile specific configs
source = $profileDir/cael.conf

# Optional sources (bars)
source = $shareDir/hyprbars.conf





###############
### SET ENV ###
###############
env = TERMINAL,kitty

################
### MONITORS ###
################

# set monitor variables
$fm = DP-2
$sm = HDMI-A-1

# set monitor alignment
monitor = $fm, 2560x1440@164.96, 1920x0, 1
monitor = $sm, 1920x1080@180, 0x360, 1

##################
### WORKSPACES ###
##################

workspace = 1, monitor:$fm
workspace = 2, monitor:$fm
workspace = 3, monitor:$fm
workspace = 4, monitor:$fm
workspace = 5, monitor:$fm

workspace = 6, monitor:$sm
workspace = 7, monitor:$sm
workspace = 8, monitor:$sm
workspace = 9, monitor:$sm
workspace = 10, monitor:$sm

# workspace = 11, monitor:$sm
# workspace = 12, monitor:$sm
# workspace = 13, monitor:$sm
# workspace = 14, monitor:$sm
# workspace = 15, monitor:$sm
# workspace = 16, monitor:$sm
# workspace = 17, monitor:$sm
# workspace = 18, monitor:$sm
# workspace = 19, monitor:$sm
# workspace = 20, monitor:$sm

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use



#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent

exec-once = mkdir -p ~/Videos/Replays && gpu-screen-recorder -w DP-2 -f 60 -a default_output -a default_input -q very_high -r 300 -o ~/Videos/Replays -c mkv




#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

layerrule = blur on, match:namespace waybar

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 4

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(585b70aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = false # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true  # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
	vfr = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

# Unreal Editor
windowrule {
    name = unreal-editor-main
    match:class = ^(UnrealEditor)$

    opaque = true
    no_blur = true
    no_anim = true
    no_follow_mouse = true
    opacity = 1.0 1.0
}

# Optional: keep the main editor centered/floating.
# Leave this OFF at first. Only enable it after drag behavior is confirmed fixed.
# windowrule {
#     name = unreal-editor-float
#     match:class = ^(UnrealEditor)$
#
#     float = true
#     center = true
#     size = 1920 1080
# }

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = ^(hyprland-run)$

    move = 20 (monitor_h-120)
    float = true
}

# Steam floating windowRule
windowrule {
    name = floating-steam-windows
    match:class = ^(steam)$

    float = true
    size = 900 700
    center = true
}

windowrule {
    name = keep-main-steam-tiled
    match:title = ^(Steam)$

    float = false
}

windowrule {
	name = keep-web-server-opaque
	match:title = "goatHub *" — Mozilla Firefox
	
	opaque = true
}

windowrule {
    name = float-and-opaque-apps
    match:class = steam_app_374320 # Dark Souls 3

    match:title = quickshell
    match:class = krita

    opaque = true
    float = true
}

windowrule {
    name = float-apps-no-opaque
    match:class = org.kde.dolphin

    float = true
    size = 1280 800

    center = true
}


